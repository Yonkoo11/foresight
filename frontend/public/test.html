<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timecaster - Diagnostic Test</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #0a0a0a;
      color: white;
      font-family: system-ui, sans-serif;
    }
    .status { margin: 20px 0; padding: 15px; border-radius: 8px; }
    .success { background: #1a3a1a; border: 1px solid #2ecc71; }
    .error { background: #3a1a1a; border: 1px solid #e74c3c; }
  </style>
</head>
<body>
  <h1>🔮 Timecaster Diagnostic Test</h1>
  <div id="results"></div>

  <script>
    const results = document.getElementById('results');

    function addResult(message, isSuccess) {
      const div = document.createElement('div');
      div.className = `status ${isSuccess ? 'success' : 'error'}`;
      div.textContent = (isSuccess ? '✅ ' : '❌ ') + message;
      results.appendChild(div);
    }

    // Test 1: Basic JavaScript
    try {
      addResult('JavaScript is working', true);
    } catch(e) {
      addResult('JavaScript failed: ' + e.message, false);
    }

    // Test 2: Check if modules are supported
    if ('noModule' in HTMLScriptElement.prototype) {
      addResult('ES Modules supported', true);
    } else {
      addResult('ES Modules NOT supported', false);
    }

    // Test 3: Check localStorage
    try {
      localStorage.setItem('test', 'test');
      localStorage.removeItem('test');
      addResult('LocalStorage working', true);
    } catch(e) {
      addResult('LocalStorage failed', false);
    }

    // Test 4: Fetch API
    if (typeof fetch === 'function') {
      addResult('Fetch API available', true);
    } else {
      addResult('Fetch API NOT available', false);
    }

    // Test 5: Try to load main app
    addResult('If you see this page, the server is working. Now check http://localhost:5173', true);
  </script>
</body>
</html>
