version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: timecaster-db
    environment:
      POSTGRES_USER: timecaster
      POSTGRES_PASSWORD: timecaster123
      POSTGRES_DB: timecaster
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timecaster"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
