[profile.default]
src = "src"
out = "out"
libs = ["lib"]
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "openzeppelin-contracts/=lib/openzeppelin-contracts/"
]

# Etherscan API keys for verification
[etherscan]
base-sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }

# RPC endpoints
[rpc_endpoints]
base-sepolia = "${BASE_SEPOLIA_RPC_URL}"
